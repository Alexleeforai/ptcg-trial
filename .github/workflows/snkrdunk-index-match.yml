name: SNKRDUNK Index and Match

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
      sitemap_limit:
        description: "How many sitemap .xml.gz files to process"
        required: true
        default: "1"
      max_urls:
        description: "Max product urls per sitemap (0 = all)"
        required: true
        default: "3000"
      dry_run:
        description: "Do not write DB updates"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "30 19 * * *" # 03:30 HKT daily

jobs:
  index-and-match:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build/update SNKRDUNK index
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SNKRDUNK_UA: ${{ secrets.SNKRDUNK_UA }}
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          LIMIT="${{ github.event.inputs.sitemap_limit || '1' }}"
          MAX_URLS="${{ github.event.inputs.max_urls || '3000' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          echo "mode=${MODE} limit=${LIMIT} max_urls=${MAX_URLS} dry=${DRY}"
          node scripts/snkrdunk-build-index.mjs --mode="${MODE}" --sitemap-limit="${LIMIT}" --max-urls="${MAX_URLS}" --dry-run="${DRY}"

      - name: Auto match cards from index
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          node scripts/snkrdunk-auto-match-from-index.mjs --dry-run="${DRY}"

